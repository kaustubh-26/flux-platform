name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".github/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".github/**"
      - "docs/**"
      - "**/*.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

name: Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".github/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".github/**"
      - "docs/**"
      - "**/*.md"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit
        
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      kafka:
        image: apache/kafka:3.8.0
        ports:
          - "9092:9092"
          - "9093:9093"
        env:
          # KRaft mode (no Zookeeper)
          KAFKA_PROCESS_ROLES: "broker,controller"
          KAFKA_NODE_ID: 1
          KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
          CLUSTER_ID: 'PYN_mQZxRMC0xTX0hu8_aA'

          # Listeners
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

          # Basic broker config
          KAFKA_LOG_DIRS: "/var/lib/kafka/data"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

          KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
          KAFKA_LOG4J_LOGGERS: 'kafka.cluster.Partition=WARN,kafka.log.UnifiedLog=WARN,kafka.coordinator.group=WARN'
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_NUM_PARTITIONS: 1

          # Reduce log retention (disk safe)
          KAFKA_LOG_RETENTION_HOURS: 24
          KAFKA_LOG_SEGMENT_BYTES: 134217728  # 128MB

          # -----------------------------
          # MEMORY OPTIMIZATION
          # -----------------------------
          KAFKA_HEAP_OPTS: "-Xms192m -Xmx192m"

      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for Kafka to be ready
        run: |
          echo "Waiting for Kafka..."
          for i in {1..30}; do
            nc -z localhost 9092 && echo "Kafka is ready!" && exit 0
            sleep 2
          done
          echo "Kafka failed to start"
          exit 1

      - name: Create Kafka topics
        run: |
          docker run --rm --network host apache/kafka:3.8.0 \
            /bin/bash -c "
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic crypto.service.command.topcoins.refresh --partitions 1 --replication-factor 1 &&
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic crypto.service.command.topmovers.refresh --partitions 1 --replication-factor 1
            "

      - name: Run Integration Tests
        run: npm run test:int
        env:
          KAFKA_BROKER: localhost:9092
          VALKEY_HOST: localhost
          VALKEY_PORT: 6379
